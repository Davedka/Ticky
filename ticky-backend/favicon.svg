<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0d2a5c"/>
      <stop offset="100%" stop-color="#060f1e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c76b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8972a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#c8972a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c76b"/>
      <stop offset="100%" stop-color="#c8972a"/>
    </linearGradient>
    <filter id="f" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <line x1="0" y1="10" x2="32" y2="10" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="20" x2="32" y2="20" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="10" y1="0" x2="10" y2="32" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="20" y1="0" x2="20" y2="32" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <circle cx="16" cy="16" r="10" fill="url(#glow)"/>
  <rect x="4" y="0" width="24" height="1.5" rx="0.75" fill="url(#goldLine)"/>

  <rect x="6" y="8" width="20" height="3.2" rx="1" fill="url(#letterGrad)" filter="url(#f)"/>
  <rect x="13" y="8" width="6" height="17" rx="1" fill="url(#letterGrad)" filter="url(#f)"/>
  <rect x="10.5" y="22.5" width="11" height="2" rx="1" fill="url(#letterGrad)" opacity="0.85"/>

  <circle cx="6" cy="6" r="2" fill="#c8972a" opacity="0.9"/>
  <circle cx="6" cy="6" r="1.2" fill="#f0c76b"/>
</svg>
